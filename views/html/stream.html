<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Viewer</title>
<link rel="stylesheet" href="/css/stream.css">
</head>
<body>

<div id="topbar">
  <a href="/">← Map</a>
  <h1>Camera Viewer</h1>
  <div id="layout-btns">
    <button class="layout-btn active" data-layout="1" title="1 camera">1</button>
    <button class="layout-btn" data-layout="2" title="2 cameras">2</button>
    <button class="layout-btn" data-layout="4" title="4 cameras">2×2</button>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-head">Cameras</div>
    <div id="cam-list"></div>
    <div id="stream-select-panel">
      <label>Stream</label>
      <select id="stream-select"></select>
      <button id="open-stream-btn">Open</button>
    </div>
  </div>

  <div id="grid" class="layout-1"></div>
</div>

<div id="rec-panel">
  <div id="rec-panel-head">
    <h2>Recordings</h2>
    <button id="rec-panel-close">×</button>
  </div>
  <div id="rec-list"></div>
</div>
<button id="rec-toggle">⏺ Recordings</button>

<div id="toast"></div>

<script src="/js/stream.js" defer></script>
<script defer>
  window.SAMAR = {
    isModer: {{ if .isModer }}true{{ else }}false{{ end }},
    isAdmin: {{ if .isAdmin }}true{{ else }}false{{ end }},
  };
  document.addEventListener("DOMContentLoaded", function() { StreamApp.init(); });
</script>
</body>
</html>
